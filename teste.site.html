<index.html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCSom Equipadora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0d0d0d,#1a1a1a);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

.logo { color: #00ffcc; font-weight: bold; }

.search {
  padding: 8px;
  border-radius: 10px;
  border: none;
}

/* PRODUTOS */
.produtos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  width: 220px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  height: 150px;
}

.card-body {
  padding: 12px;
  text-align: center;
}

.preco {
  color: #00ffcc;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #00ffcc;
  cursor: pointer;
}

/* BOTÃO CARRINHO */
.cart-btn {
  position: fixed;
  right: 15px;
  top: 15px;
  background: #00ffcc;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
}

.modal-content h2 {
  color: #00ffcc;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

/* WHATS */
.whatsapp {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">JCSom 🔊</div>
  <input class="search" placeholder="Buscar..." onkeyup="buscar(this.value)">
</nav>

<div class="cart-btn" onclick="abrirCarrinho()">🛒 <span id="qtd">0</span></div>

<section class="produtos" id="produtos"></section>

<!-- MODAL CARRINHO -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Carrinho</h2>
    <div id="lista"></div>
    <p>Total: R$ <span id="total">0</span></p>
    <button onclick="comprar()">Finalizar</button>
    <button onclick="fecharCarrinho()">Fechar</button>
  </div>
</div>

<div class="whatsapp" onclick="whatsapp()">📱</div>

<script>
let produtos = [
  {nome:"Caixa de Som", preco:299, img:"https://via.placeholder.com/200"},
  {nome:"Subwoofer", preco:380, img:"https://via.placeholder.com/200"},
  {nome:"Módulo", preco:450, img:"https://via.placeholder.com/200"},
  {nome:"Tweeter", preco:120, img:"https://via.placeholder.com/200"},
];

let carrinho = [];
let total = 0;

function render(lista) {
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div class="card-body">
        <h3>${p.nome}</h3>
        <div>⭐⭐⭐⭐⭐</div>
        <p class="preco">R$ ${p.preco}</p>
        <button onclick="add('${p.nome}',${p.preco})">Adicionar</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML=html;
}

function buscar(v){
  let f=produtos.filter(p=>p.nome.toLowerCase().includes(v.toLowerCase()));
  render(f);
}

function add(nome,preco){
  carrinho.push({nome,preco});
  total+=preco;
  atualizar();
}

function atualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  carrinho.forEach((item,i)=>{
    lista.innerHTML+=`
    <div class="item">
      ${item.nome} - R$ ${item.preco}
      <span onclick="remover(${i})">❌</span>
    </div>`;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("qtd").innerText=carrinho.length;
}

function remover(i){
  total-=carrinho[i].preco;
  carrinho.splice(i,1);
  atualizar();
}

function abrirCarrinho(){
  document.getElementById("modal").style.display="flex";
}

function fecharCarrinho(){
  document.getElementById("modal").style.display="none";
}

function comprar(){
  let numero="5583993758598";
  let msg="Pedido: "+carrinho.map(i=>i.nome).join(", ")+" Total: R$ "+total;
  window.open("https://wa.me/"+numero+"?text="+msg);
}

function whatsapp(){
  window.open("https://wa.me/5583993758598");
}

render(produtos);
</script>

</body>
</html>
